name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Crystal
        uses: crystal-lang/install-crystal@v1
        with:
          crystal_version: 1.20.0

      - name: Install dependencies
        run: shards install

      - name: Run tests
        run: crystal spec

      - name: Run linter
        run: ./bin/ameba

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Crystal
        uses: crystal-lang/install-crystal@v1
        with:
          crystal_version: 1.20.0

      - name: Build
        run: |
          shards install --without development
          crystal build src/searxng_web_fetch_mcp.cr --release

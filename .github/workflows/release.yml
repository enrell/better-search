name: Build and Release Binaries

on:
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v0.3.0)'
        required: true

permissions:
  contents: write

env:
  RELEASE_TAG: ${{ github.event.release.tag_name || inputs.version }}

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            name: better-search-mcp-linux-x86_64
          - os: ubuntu-latest
            goos: linux
            goarch: arm64
            name: better-search-mcp-linux-arm64
          - os: ubuntu-latest
            goos: linux
            goarch: riscv64
            name: better-search-mcp-linux-riscv64
          - os: macos-latest
            goos: darwin
            goarch: arm64
            name: better-search-mcp-darwin-arm64
          - os: macos-latest
            goos: darwin
            goarch: amd64
            name: better-search-mcp-darwin-x86_64
          - os: windows-latest
            goos: windows
            goarch: amd64
            name: better-search-mcp-windows-x86_64.exe
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Download dependencies
        run: go mod download

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          go build -o ${{ matrix.name }} .

      - name: Upload
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: ${{ matrix.name }}
          overwrite_files: true

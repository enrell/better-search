name: Release Notes

on:
  release:
    types: [published, edited]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v0.3.0)'
        required: true

permissions:
  contents: write

jobs:
  notes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release tag
        id: tag
        shell: bash
        run: |
          if [ -n "${{ github.event.release.tag_name }}" ]; then
            echo "tag=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build release notes
        id: notes
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ steps.tag.outputs.tag }}"
          previous_tag="$(git tag --sort=-version:refname | grep -Fxv "$tag" | head -n 1 || true)"

          {
            echo "body<<EOF"
            echo "## Release Notes for ${tag}"
            echo
            if [ -n "$previous_tag" ]; then
              echo "Changes since ${previous_tag}:"
              echo
              git log --no-merges --pretty=format:'- %s (%h)' "${previous_tag}..${tag}"
            else
              echo "Initial release or no previous tag was found."
              echo
              git log --no-merges --pretty=format:'- %s (%h)' "${tag}" | head -n 50
            fi
            echo
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Update release body
        uses: actions/github-script@v7
        env:
          RELEASE_TAG: ${{ steps.tag.outputs.tag }}
          RELEASE_BODY: ${{ steps.notes.outputs.body }}
        with:
          script: |
            const tag = process.env.RELEASE_TAG;
            const body = process.env.RELEASE_BODY;
            const release = context.payload.release
              ? context.payload.release
              : (await github.rest.repos.getReleaseByTag({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  tag,
                })).data;

            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: release.id,
              body,
            });
